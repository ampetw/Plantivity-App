<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Congratulations — Plantivity</title>
    <link rel="preconnect" href="https://use.typekit.net" crossorigin />
    <link rel="preconnect" href="https://p.typekit.net" crossorigin />
    <link rel="stylesheet" href="https://use.typekit.net/wxp5slh.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="choose-timer-body">
    <main class="choose-timer-main" aria-label="Timer complete">
      <img
        class="choose-timer-bg"
        src="assets/dirt background.svg"
        alt=""
      />
      <div class="congrats-stack">
        <h1 class="congrats-heading">Congratulations!</h1>
        <img
          class="congrats-tulip"
          src="assets/tulip_quilt.svg"
          alt=""
        />
        <p class="congrats-message">
          You earn a new <span class="congrats-accent">tulip</span> to your
          garden!
        </p>
        <a
          class="congrats-continue-link"
          href="my-garden.html"
          id="congrats-continue"
        >
          Continue
        </a>
      </div>
    </main>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <script src="plantivity-rtdb.js"></script>
    <script src="plantivity-firebase-config.js"></script>
    <script src="plantivity-social.js"></script>
    <script>
      (function () {
        var link = document.getElementById("congrats-continue");
        var pendingObjKey = "plantivityPendingTulip";
        var pendingRewardIdKey = "plantivityTulipPendingRewardId";
        var gardenKey = "plantivityGardenTulips";

        link.addEventListener("click", function (e) {
          var rewardId = localStorage.getItem(pendingRewardIdKey);
          if (!rewardId) return;
          e.preventDefault();

          var pendingRaw = localStorage.getItem(pendingObjKey);
          var pending = null;
          if (pendingRaw) {
            try {
              pending = JSON.parse(pendingRaw);
            } catch (err) {
              pending = null;
            }
          }

          var listRaw = localStorage.getItem(gardenKey);
          var tulips = [];
          if (listRaw) {
            try {
              tulips = JSON.parse(listRaw);
            } catch (err) {
              tulips = [];
            }
          }
          if (!Array.isArray(tulips)) tulips = [];

          var alreadyAdded = tulips.some(function (t) {
            return t && t.id === rewardId;
          });

          if (!alreadyAdded && pending && pending.id) {
            tulips.push(pending);
          }

          localStorage.setItem(gardenKey, JSON.stringify(tulips));
          localStorage.removeItem(pendingRewardIdKey);
          localStorage.removeItem(pendingObjKey);
          function goHome() {
            window.location.href = "my-garden.html";
          }
          var PS = window.PlantivitySocial;
          if (PS && typeof PS.syncMyGardenToCloud === "function") {
            PS.syncMyGardenToCloud().finally(goHome);
          } else {
            goHome();
          }
        });
      })();
    </script>
  </body>
</html>
