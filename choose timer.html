<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Choose your flower timer — Plantivity</title>
    <link rel="preconnect" href="https://use.typekit.net" crossorigin />
    <link rel="preconnect" href="https://p.typekit.net" crossorigin />
    <link rel="stylesheet" href="https://use.typekit.net/wxp5slh.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="choose-timer-body">
    <main class="choose-timer-main" aria-label="Choose a flower timer">
      <img
        class="choose-timer-bg"
        src="assets/green.svg"
        alt=""
      />
      <div class="choose-timer-stack">
        <header class="choose-timer-header">
          <div class="choose-timer-title" role="heading" aria-level="1">
            Choose your flower timer!
          </div>
        </header>

        <div class="choose-timer-grid">
          <a
            class="timer-card timer-card--link"
            href="edit timer daisy.html"
            aria-label="Start 30 second daisy timer"
          >
            <span class="timer-card-frame">
              <span class="timer-card-artboard">
              <img
                class="timer-card-pack-bg"
                src="assets/pack.png"
                alt=""
                aria-hidden="true"
              />
              <span class="timer-card-face">
                <span class="timer-card-duration">0:30</span>
                <span class="timer-card-flower-wrap">
                  <img
                    class="timer-card-flower"
                    src="assets/daisy_quilt.svg"
                    alt=""
                  />
                </span>
              </span>
              </span>
            </span>
          </a>
          <a
            class="timer-card timer-card--link"
            href="edit timer tulip.html"
            aria-label="Start 1 minute tulip timer"
          >
            <span class="timer-card-frame">
              <span class="timer-card-artboard">
              <img
                class="timer-card-pack-bg"
                src="assets/pack.png"
                alt=""
                aria-hidden="true"
              />
              <span class="timer-card-face">
                <span class="timer-card-duration">1:00</span>
                <span class="timer-card-flower-wrap">
                  <img
                    class="timer-card-flower"
                    src="assets/tulip_quilt.svg"
                    alt=""
                  />
                </span>
              </span>
              </span>
            </span>
          </a>
          <a
            class="timer-card timer-card--link"
            href="edit timer iris.html"
            aria-label="Start 5 minute iris timer"
          >
            <span class="timer-card-frame">
              <span class="timer-card-artboard">
              <img
                class="timer-card-pack-bg"
                src="assets/pack.png"
                alt=""
                aria-hidden="true"
              />
              <span class="timer-card-face">
                <span class="timer-card-duration">5:00</span>
                <span class="timer-card-flower-wrap">
                  <img
                    class="timer-card-flower"
                    src="assets/iris_quilt.svg"
                    alt=""
                  />
                </span>
              </span>
              </span>
            </span>
          </a>
          <a
            class="timer-card timer-card--link"
            href="edit timer coneflower.html"
            aria-label="Start 10 minute coneflower timer"
          >
            <span class="timer-card-frame">
              <span class="timer-card-artboard">
              <img
                class="timer-card-pack-bg"
                src="assets/pack.png"
                alt=""
                aria-hidden="true"
              />
              <span class="timer-card-face">
                <span class="timer-card-duration">10:00</span>
                <span class="timer-card-flower-wrap">
                  <img
                    class="timer-card-flower"
                    src="assets/pink_quilt.svg"
                    alt=""
                  />
                </span>
              </span>
              </span>
            </span>
          </a>
        </div>

        <footer class="choose-timer-footer">
          <a class="choose-timer-leaf-link" href="my-garden.html">
            <img
              class="choose-timer-leaf"
              src="assets/leaf logo new.svg"
              alt="Back to home"
              width="48"
              height="50"
            />
          </a>
        </footer>
      </div>
    </main>
    <script src="plantivity-sfx.js"></script>
  </body>
</html>
