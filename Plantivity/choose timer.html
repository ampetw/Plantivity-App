<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Choose your flower timer — Plantivity</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="choose-timer-body">
    <main class="choose-timer-main" aria-label="Choose a flower timer">
      <img
        class="choose-timer-bg"
        src="assets/background color 5.png"
        alt=""
      />
      <div class="choose-timer-stack">
        <header class="choose-timer-header">
          <img
            class="choose-timer-title-img"
            src="assets/choose your flower timer.png"
            alt="Choose your flower timer!"
          />
        </header>

        <div class="choose-timer-grid">
          <a
            class="timer-card timer-card--link"
            href="edit timer daisy.html"
            aria-label="Start 5 minute daisy timer"
          >
            <span class="timer-card-frame">
              <span class="timer-card-artboard">
              <img
                class="timer-card-pack-bg"
                src="assets/pack.png"
                alt=""
                aria-hidden="true"
              />
              <span class="timer-card-face">
                <span class="timer-card-duration">5 min</span>
                <span class="timer-card-flower-wrap">
                  <img
                    class="timer-card-flower"
                    src="assets/daisy 1.png"
                    alt=""
                  />
                </span>
              </span>
              </span>
            </span>
          </a>
          <a
            class="timer-card timer-card--link"
            href="edit timer tulip.html"
            aria-label="Edit 10 minute tulip timer"
          >
            <span class="timer-card-frame">
              <span class="timer-card-artboard">
              <img
                class="timer-card-pack-bg"
                src="assets/pack.png"
                alt=""
                aria-hidden="true"
              />
              <span class="timer-card-face">
                <span class="timer-card-duration">10 min</span>
                <span class="timer-card-flower-wrap">
                  <img
                    class="timer-card-flower"
                    src="assets/tulip 1.png"
                    alt=""
                  />
                </span>
              </span>
              </span>
            </span>
          </a>
          <a
            class="timer-card timer-card--link"
            href="edit timer iris.html"
            aria-label="Start 30 minute iris timer"
          >
            <span class="timer-card-frame">
              <span class="timer-card-artboard">
              <img
                class="timer-card-pack-bg"
                src="assets/pack.png"
                alt=""
                aria-hidden="true"
              />
              <span class="timer-card-face">
                <span class="timer-card-duration">30 min</span>
                <span class="timer-card-flower-wrap">
                  <img
                    class="timer-card-flower"
                    src="assets/iris 1.png"
                    alt=""
                  />
                </span>
              </span>
              </span>
            </span>
          </a>
          <a
            class="timer-card timer-card--link"
            href="edit timer coneflower.html"
            aria-label="Start 60 minute coneflower timer"
          >
            <span class="timer-card-frame">
              <span class="timer-card-artboard">
              <img
                class="timer-card-pack-bg"
                src="assets/pack.png"
                alt=""
                aria-hidden="true"
              />
              <span class="timer-card-face">
                <span class="timer-card-duration">60 min</span>
                <span class="timer-card-flower-wrap">
                  <img
                    class="timer-card-flower"
                    src="assets/coneflower 1.png"
                    alt=""
                  />
                </span>
              </span>
              </span>
            </span>
          </a>
        </div>

        <footer class="choose-timer-footer">
          <a class="choose-timer-leaf-link" href="index.html">
            <img
              class="choose-timer-leaf"
              src="assets/leaf logo 1.png"
              alt="Back to home"
              width="48"
              height="50"
            />
          </a>
        </footer>
      </div>
    </main>
  </body>
</html>
