<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Coneflower details — Plantivity</title>
    <link rel="preconnect" href="https://use.typekit.net" crossorigin />
    <link rel="preconnect" href="https://p.typekit.net" crossorigin />
    <link rel="stylesheet" href="https://use.typekit.net/wxp5slh.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="choose-timer-body">
    <main
      class="choose-timer-main view-tulip-main"
      aria-label="Coneflower details"
    >
      <img
        class="choose-timer-bg"
        src="assets/green.svg"
        alt=""
      />

      <div class="view-timer-stack">
        <div class="view-timer-meta-box view-timer-meta-outer" aria-label="Timer details">
          <div
            id="view-timer-meta-date"
            class="view-timer-meta-line"
            aria-label="Date timer happened"
          ></div>
        </div>

        <div class="view-timer-flower-stage">
          <img
            class="view-timer-flower-hero"
            src="assets/pink_quilt.svg"
            alt=""
          />
        </div>

        <div class="view-timer-artboard">
          <img
            class="view-timer-pack-img"
            src="assets/pack.png"
            alt=""
            aria-hidden="true"
          />

          <div class="view-timer-face">
            <div class="view-timer-title-wrap">
              <div
                id="view-timer-title"
                class="view-timer-title"
                aria-label="Timer Title"
              ></div>
            </div>

            <div class="view-timer-body-wrap">
              <div
                id="view-timer-description"
                class="view-timer-description"
                aria-label="Enter description"
              ></div>
            </div>
          </div>
        </div>

        <footer class="choose-timer-footer view-timer-footer">
          <a class="choose-timer-leaf-link" href="my-garden.html">
            <img
              class="choose-timer-leaf"
              src="assets/leaf logo new.svg"
              alt="Back to home"
              width="48"
              height="50"
            />
          </a>
          <a
            class="view-timer-delete-link"
            href="delete flower confirm.html"
            aria-label="Delete this timer"
          >
            <img
              class="view-timer-delete-icon"
              src="assets/x_trash.png"
              alt=""
            />
          </a>
        </footer>
      </div>
    </main>

    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var id = params.get("id");

        var titleEl = document.getElementById("view-timer-title");
        var descEl = document.getElementById("view-timer-description");
        var metaDateEl = document.getElementById("view-timer-meta-date");

        if (!id || !titleEl || !descEl) return;

        var gardenKey = "plantivityGardenConeflowers";
        var listRaw = localStorage.getItem(gardenKey);
        var coneflowers = [];
        if (listRaw) {
          try {
            coneflowers = JSON.parse(listRaw);
          } catch (err) {
            coneflowers = [];
          }
        }

        if (!Array.isArray(coneflowers)) return;

        var item = coneflowers.find(function (t) {
          return t && t.id === id;
        });

        if (!item) return;

        titleEl.textContent = item.title || "";
        descEl.textContent = item.description || "";

        // Also mirror the values into the same keys used by the edit screen.
        // This makes it easier to implement “edit” later without changing the data model.
        localStorage.setItem(
          "plantivityConeflowerTitle",
          item.title || ""
        );
        localStorage.setItem(
          "plantivityConeflowerDescription",
          item.description || ""
        );
        localStorage.setItem("plantivitySelectedConeflowerId", item.id);

        localStorage.setItem("plantivityDeleteFlower", "coneflower");
        localStorage.setItem("plantivityDeleteId", item.id);
        localStorage.setItem("plantivityDeleteTitle", item.title || "");
        localStorage.setItem(
          "plantivityDeleteDescription",
          item.description || ""
        );
        localStorage.setItem("plantivityDeleteReturnUrl", window.location.href);

        function pad2(n) {
          return String(n).padStart(2, "0");
        }

        function formatDate(createdAt) {
          var d = new Date(createdAt);
          if (!d || isNaN(d.getTime())) return "";
          var mm = pad2(d.getMonth() + 1);
          var dd = pad2(d.getDate());
          var yyyy = d.getFullYear();
          return mm + "/" + dd + "/" + yyyy;
        }

        if (metaDateEl) {
          metaDateEl.textContent = item.createdAt
            ? formatDate(item.createdAt)
            : "";
        }
      })();
    </script>
  </body>
</html>
