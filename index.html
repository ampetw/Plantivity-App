<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Plantivity</title>
    <link rel="preconnect" href="https://use.typekit.net" crossorigin />
    <link rel="preconnect" href="https://p.typekit.net" crossorigin />
    <link rel="stylesheet" href="https://use.typekit.net/wxp5slh.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="choose-timer-body profile-body">
    <main class="choose-timer-main profile-main" aria-label="Sign in">
      <div class="profile-stack">
        <div class="profile-auth-section" id="home-auth-section" hidden>
          <p class="profile-auth-intro">
            Sign in with your email to save your profile and appear in Community.
          </p>
          <label class="visually-hidden" for="home-auth-email">Email</label>
          <input
            id="home-auth-email"
            class="profile-auth-input"
            type="email"
            autocomplete="username"
            placeholder="Email"
          />
          <label class="visually-hidden" for="home-auth-password">Password</label>
          <input
            id="home-auth-password"
            class="profile-auth-input"
            type="password"
            autocomplete="current-password"
            placeholder="Password"
          />
          <p class="profile-auth-error" id="home-auth-error" role="alert"></p>
          <p class="profile-auth-forgot-wrap">
            <a class="profile-auth-forgot" href="forgot-password.html">Forgot password?</a>
          </p>
          <div class="profile-auth-actions">
            <button type="button" class="profile-auth-btn" id="home-auth-signin">
              Sign in
            </button>
            <button
              type="button"
              class="profile-auth-btn profile-auth-btn--secondary"
              id="home-auth-signup"
            >
              Create account
            </button>
          </div>
        </div>

        <div class="profile-signed-row" id="home-signed-row" hidden>
          <span class="profile-signed-email" id="home-signed-email"></span>
          <button type="button" class="profile-signout-btn" id="home-auth-signout">
            Sign out
          </button>
        </div>

      </div>
    </main>
    <script src="plantivity-sfx.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <script src="plantivity-rtdb.js"></script>
    <script src="plantivity-firebase-config.js"></script>
    <script src="plantivity-social.js"></script>
    <script>
      (function () {
        var PS = window.PlantivitySocial;
        if (!PS) return;

        var authSection = document.getElementById("home-auth-section");
        var signedRow = document.getElementById("home-signed-row");
        var signedEmailEl = document.getElementById("home-signed-email");

        var authEmail = document.getElementById("home-auth-email");
        var authPass = document.getElementById("home-auth-password");
        var authError = document.getElementById("home-auth-error");
        var btnSignin = document.getElementById("home-auth-signin");
        var btnSignup = document.getElementById("home-auth-signup");
        var btnSignout = document.getElementById("home-auth-signout");

        function setAuthError(msg) {
          if (authError) authError.textContent = msg || "";
        }

        function applyAuthUi(user) {
          var sdk = PS.useFirebaseSdk();
          if (!sdk) {
            if (authSection) authSection.hidden = true;
            if (signedRow) signedRow.hidden = true;
            return;
          }
          if (user) {
            if (authSection) authSection.hidden = true;
            if (signedRow) signedRow.hidden = false;
            if (signedEmailEl) signedEmailEl.textContent = user.email || "Signed in";
          } else {
            if (authSection) authSection.hidden = false;
            if (signedRow) signedRow.hidden = true;
          }
        }

        PS.onAuthStateChanged(function (user) {
          applyAuthUi(user);
          if (user && PS.useFirebaseSdk()) {
            PS.syncMyGardenToCloud().catch(function () {});
          }
        });

        if (btnSignin) {
          btnSignin.addEventListener("click", function () {
            setAuthError("");
            PS.signInWithEmailPassword(authEmail.value, authPass.value)
              .then(function () {
                window.location.href = "my-garden.html";
              })
              .catch(function (err) {
                setAuthError(err && err.message ? err.message : "Sign-in failed.");
              });
          });
        }
        if (btnSignup) {
          btnSignup.addEventListener("click", function () {
            setAuthError("");
            PS.signUpWithEmailPassword(authEmail.value, authPass.value)
              .then(function () {
                window.location.href = "my-garden.html";
              })
              .catch(function (err) {
                setAuthError(err && err.message ? err.message : "Could not create account.");
              });
          });
        }
        if (btnSignout) {
          btnSignout.addEventListener("click", function () {
            PS.signOutFirebase();
          });
        }
      })();
    </script>
  </body>
</html>
