<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>My Garden — Plantivity</title>
    <link rel="preconnect" href="https://use.typekit.net" crossorigin />
    <link rel="preconnect" href="https://p.typekit.net" crossorigin />
    <link rel="stylesheet" href="https://use.typekit.net/wxp5slh.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="index-body">
    <div class="index-scroll">
      <main class="index-main" aria-label="Plantivity garden screen">
        <div class="index-top-bar" id="index-top-bar-default">
          <a class="index-top-icon-link" href="profile.html" aria-label="My profile">
            <img src="assets/new%20profile.svg" alt="" width="40" height="40" />
          </a>
          <a class="index-top-icon-link" href="community.html" aria-label="Community">
            <img src="assets/community.svg" alt="" width="40" height="40" />
          </a>
        </div>
        <div class="index-bg-stack" aria-hidden="true">
          <img
            class="index-garden-bg"
            src="assets/new%20background.svg"
            alt=""
          />
          <div class="index-bg-soil-extension"></div>
        </div>
        <div class="index-content-flow">
          <div
            class="index-garden-tulips"
            id="garden-tulips"
            aria-label="Flowers you have earned"
          ></div>
        </div>
        <a class="index-new-timer-link" id="index-new-timer-link" href="choose timer.html">
          New Timer
        </a>
        <footer class="index-visitor-footer" id="index-visitor-footer" hidden>
          <a class="choose-timer-leaf-link" href="community.html" aria-label="Back to community">
            <img
              class="choose-timer-leaf"
              src="assets/leaf logo new.svg"
              alt=""
              width="48"
              height="50"
            />
          </a>
        </footer>
      </main>
    </div>
    <script src="plantivity-sfx.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <script src="plantivity-rtdb.js"></script>
    <script src="plantivity-firebase-config.js"></script>
    <script src="plantivity-social.js"></script>
    <script>
      (function () {
        var host = document.getElementById("garden-tulips");
        if (!host) return;

        var params = new URLSearchParams(window.location.search);
        var visitorUid = params.get("user");
        var PS = window.PlantivitySocial;

        var metaByKey = [
          {
            gardenKey: "plantivityGardenTulips",
            flower: "tulip",
            imgSrc: "assets/tulip_quilt.svg",
            viewHrefBase: "view tulip.html?id=",
          },
          {
            gardenKey: "plantivityGardenDaisies",
            flower: "daisy",
            imgSrc: "assets/daisy_quilt.svg",
            viewHrefBase: "view daisy.html?id=",
          },
          {
            gardenKey: "plantivityGardenIrises",
            flower: "iris",
            imgSrc: "assets/iris_quilt.svg",
            viewHrefBase: "view iris.html?id=",
          },
          {
            gardenKey: "plantivityGardenConeflowers",
            flower: "coneflower",
            imgSrc: "assets/pink_quilt.svg",
            viewHrefBase: "view coneflower.html?id=",
          },
        ];

        function readListLocal(gardenKey) {
          var listRaw = localStorage.getItem(gardenKey);
          if (!listRaw) return [];
          try {
            var parsed = JSON.parse(listRaw);
            return Array.isArray(parsed) ? parsed : [];
          } catch (err) {
            return [];
          }
        }

        function collectItemsFromLocal() {
          var items = [];
          for (var i = 0; i < metaByKey.length; i += 1) {
            var meta = metaByKey[i];
            var list = readListLocal(meta.gardenKey);
            for (var j = 0; j < list.length; j += 1) {
              var item = list[j];
              if (!item || !item.id) continue;
              items.push({ meta: meta, item: item });
            }
          }
          return items;
        }

        function collectItemsFromGarden(garden) {
          var items = [];
          if (!PS || typeof PS.readListFromGardenObject !== "function") return items;
          for (var i = 0; i < metaByKey.length; i += 1) {
            var meta = metaByKey[i];
            var list = PS.readListFromGardenObject(garden, meta.gardenKey);
            for (var j = 0; j < list.length; j += 1) {
              var item = list[j];
              if (!item || !item.id) continue;
              items.push({ meta: meta, item: item });
            }
          }
          return items;
        }

        function sortItems(items) {
          items.sort(function (a, b) {
            var at = a.item.createdAt || 0;
            var bt = b.item.createdAt || 0;
            if (at !== bt) return at - bt;
            return String(a.item.id || "").localeCompare(String(b.item.id || ""));
          });
        }

        function renderGarden(items, ownerUid) {
          host.innerHTML = "";
          if (items.length < 1) {
            if (ownerUid) {
              var empty = document.createElement("p");
              empty.className = "index-visitor-empty";
              empty.textContent =
                "No flowers synced for Community yet. Flowers stay on this phone until you sign in (or open My Garden while signed in)—then they upload for others to see.";
              host.appendChild(empty);
            }
            return;
          }
          sortItems(items);
          for (var k = 0; k < items.length; k += 1) {
            var entry = items[k];
            var meta = entry.meta;
            var item = entry.item;

            var cell = document.createElement("div");
            cell.className = "index-garden-cell";

            var link = document.createElement("a");
            link.className = "index-garden-tulip-link";
            if (ownerUid) {
              link.href =
                "visitor-flower.html?user=" +
                encodeURIComponent(ownerUid) +
                "&flower=" +
                encodeURIComponent(meta.flower) +
                "&id=" +
                encodeURIComponent(item.id);
            } else {
              link.href = meta.viewHrefBase + encodeURIComponent(item.id);
            }
            link.setAttribute(
              "aria-label",
              "View timer: " + (item.title ? item.title : meta.flower)
            );

            var img = document.createElement("img");
            img.src = meta.imgSrc;
            img.alt = "";
            img.className = "index-garden-tulip";

            link.appendChild(img);
            cell.appendChild(link);
            host.appendChild(cell);
          }
        }

        function applyVisitorChrome() {
          document.body.classList.add("index-body--visitor");
          var def = document.getElementById("index-top-bar-default");
          var nt = document.getElementById("index-new-timer-link");
          var foot = document.getElementById("index-visitor-footer");
          if (def) def.hidden = true;
          if (nt) nt.hidden = true;
          if (foot) foot.hidden = false;
        }

        function runOwnGarden() {
          document.body.classList.remove("index-body--visitor");
          var def = document.getElementById("index-top-bar-default");
          var nt = document.getElementById("index-new-timer-link");
          var foot = document.getElementById("index-visitor-footer");
          if (def) def.hidden = false;
          if (nt) nt.hidden = false;
          if (foot) foot.hidden = true;

          var items = collectItemsFromLocal();
          if (items.length < 1) {
            host.innerHTML = "";
          } else {
            renderGarden(items, null);
          }
          if (PS && typeof PS.syncMyGardenToCloud === "function") {
            PS.syncMyGardenToCloud().catch(function () {});
          }
        }

        function runVisitor(uid) {
          applyVisitorChrome();
          if (!PS || typeof PS.loadUserGarden !== "function") {
            host.innerHTML =
              "<p class=\"index-visitor-empty\">Could not load gardens. Check Firebase configuration.</p>";
            return;
          }
          var visitLoadId = 0;
          function go(user) {
            visitLoadId += 1;
            var loadId = visitLoadId;
            if (!user) {
              host.innerHTML = "";
              var w = document.createElement("p");
              w.className = "index-visitor-empty";
              var t = document.createTextNode("Sign in to view another gardener’s garden. ");
              var a = document.createElement("a");
              a.className = "index-inline-link";
              a.href = "index.html";
              a.textContent = "Sign in";
              w.appendChild(t);
              w.appendChild(a);
              w.appendChild(document.createTextNode("."));
              host.appendChild(w);
              return;
            }
            PS.loadUserGarden(uid)
              .then(function (garden) {
                if (loadId !== visitLoadId) return;
                var items = collectItemsFromGarden(garden);
                renderGarden(items, uid);
              })
              .catch(function (err) {
                if (loadId !== visitLoadId) return;
                if (typeof console !== "undefined" && console.error) {
                  console.error("Plantivity: loadUserGarden failed", err);
                }
                var msg = "Could not load this garden.";
                if (err && err.code === "PERMISSION_DENIED") {
                  msg =
                    "Could not load this garden (permission denied). In Firebase Console → Realtime Database → Rules, allow signed-in users to read plantivity/gardens (see the gardens block in plantivity-rtdb.js), then Publish.";
                } else if (err && err.code === "UNAVAILABLE") {
                  msg =
                    "Could not reach the database. Check your network and that the Realtime Database is enabled for this Firebase project.";
                }
                host.innerHTML =
                  "<p class=\"index-visitor-empty\">" + msg + "</p>";
              });
          }
          if (PS.useFirebaseSdk()) {
            var auth = firebase.auth();
            if (typeof auth.authStateReady === "function") {
              auth.authStateReady().then(function () {
                auth.onAuthStateChanged(go);
              });
            } else {
              PS.onAuthStateChanged(go);
            }
          } else {
            go(null);
          }
        }

        if (visitorUid) {
          runVisitor(String(visitorUid).trim());
        } else {
          runOwnGarden();
        }
      })();
    </script>
  </body>
</html>
