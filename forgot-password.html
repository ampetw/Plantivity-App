<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Reset password — Plantivity</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="choose-timer-body profile-body">
    <main class="choose-timer-main profile-main" aria-label="Reset password">
      <div class="profile-stack">
        <div class="forgot-password-panel">
          <h1 class="forgot-password-title">Forgot password</h1>
          <p class="forgot-password-intro">
            Enter the email for your account. We’ll send a link to reset your password.
          </p>
          <label class="visually-hidden" for="forgot-email">Email</label>
          <input
            id="forgot-email"
            class="profile-auth-input"
            type="email"
            autocomplete="email"
            placeholder="Email"
          />
          <p class="profile-auth-error" id="forgot-error" role="alert"></p>
          <p class="forgot-password-success" id="forgot-success" role="status" hidden></p>
          <button type="button" class="profile-auth-btn" id="forgot-submit">
            Send reset email
          </button>
          <p class="forgot-password-back">
            <a class="community-inline-link" href="profile.html">Back to sign in</a>
          </p>
        </div>
        <footer class="choose-timer-footer profile-footer">
          <a class="choose-timer-leaf-link" href="index.html">
            <img
              class="choose-timer-leaf"
              src="assets/leaf logo 1.png"
              alt="Back to garden"
              width="48"
              height="50"
            />
          </a>
        </footer>
      </div>
    </main>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <script src="plantivity-rtdb.js"></script>
    <script src="plantivity-firebase-config.js"></script>
    <script src="plantivity-social.js"></script>
    <script>
      (function () {
        var PS = window.PlantivitySocial;
        var emailEl = document.getElementById("forgot-email");
        var errEl = document.getElementById("forgot-error");
        var okEl = document.getElementById("forgot-success");
        var btn = document.getElementById("forgot-submit");
        if (!PS || !emailEl || !btn) return;

        function setErr(msg) {
          if (errEl) errEl.textContent = msg || "";
          if (okEl) {
            okEl.textContent = "";
            okEl.hidden = true;
          }
        }

        function setOk(msg) {
          if (errEl) errEl.textContent = "";
          if (okEl) {
            okEl.textContent = msg || "";
            okEl.hidden = !msg;
          }
        }

        btn.addEventListener("click", function () {
          setErr("");
          if (!PS.useFirebaseSdk()) {
            setErr("Firebase is not configured.");
            return;
          }
          PS.sendPasswordResetEmail(emailEl.value)
            .then(function () {
              setOk("Check your inbox for a reset link. If it doesn’t arrive, verify the email and spam folder.");
              btn.disabled = true;
            })
            .catch(function (e) {
              var m =
                e && e.message
                  ? e.message
                  : "Could not send email. Try again or check Firebase Authentication settings.";
              setErr(m);
            });
        });
      })();
    </script>
  </body>
</html>
