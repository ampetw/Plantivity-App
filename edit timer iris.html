<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Edit timer — Iris — Plantivity</title>
    <link rel="preconnect" href="https://use.typekit.net" crossorigin />
    <link rel="preconnect" href="https://p.typekit.net" crossorigin />
    <link rel="stylesheet" href="https://use.typekit.net/wxp5slh.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="choose-timer-body">
    <main class="choose-timer-main" aria-label="Edit iris timer">
      <img
        class="choose-timer-bg"
        src="assets/dirt background.svg"
        alt=""
      />
      <form class="edit-timer-stack" id="edit-timer-form" action="#" method="post">
        <div class="edit-timer-flower-stage">
          <img
            class="edit-timer-flower-hero"
            src="assets/iris_quilt.svg"
            alt=""
          />
        </div>
        <div class="edit-timer-artboard">
          <img
            class="edit-timer-pack-img"
            src="assets/pack.png"
            alt=""
            aria-hidden="true"
          />
          <div class="edit-timer-face">
            <div class="edit-timer-title-wrap">
              <label class="visually-hidden" for="timer-title">Timer title</label>
              <input
                id="timer-title"
                class="edit-timer-title-input"
                type="text"
                name="timer_title"
                placeholder="Timer Title"
                autocomplete="off"
              />
            </div>
            <div class="edit-timer-body-wrap">
              <label class="visually-hidden" for="timer-description"
                >Description</label
              >
              <textarea
                id="timer-description"
                class="edit-timer-description-input"
                name="description"
                rows="5"
                placeholder="Enter description"
              ></textarea>
            </div>
          </div>
        </div>

        <button type="submit" class="edit-timer-start-btn">Start Timer</button>

        <footer class="choose-timer-footer">
          <a class="choose-timer-leaf-link" href="choose timer.html">
            <img
              class="choose-timer-leaf"
              src="assets/leaf logo new.svg"
              alt="Back to choose timer"
              width="48"
              height="50"
            />
          </a>
        </footer>
      </form>
    </main>
    <script>
      document
        .getElementById("edit-timer-form")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          var titleEl = document.getElementById("timer-title");
          var descEl = document.getElementById("timer-description");

          // Save the iris the user entered so the animation + congrats screens
          // can add it into the garden.
          var pendingId =
            "iris_" +
            String(Date.now()) +
            "_" +
            String(Math.floor(Math.random() * 10000));
          var pending = {
            id: pendingId,
            flower: "iris",
            title: titleEl ? titleEl.value : "",
            description: descEl ? descEl.value : "",
            durationMs: 1800000,
            createdAt: Date.now(),
          };
          localStorage.setItem("plantivityPendingIris", JSON.stringify(pending));
          localStorage.removeItem("plantivityIrisPendingRewardId");

          localStorage.setItem("plantivityIrisRunStart", String(Date.now()));
          localStorage.setItem("plantivityIrisRunDurationMs", "1800000");
          localStorage.setItem(
            "plantivityIrisTitle",
            titleEl ? titleEl.value : ""
          );
          localStorage.setItem(
            "plantivityIrisDescription",
            descEl ? descEl.value : ""
          );
          window.location.href = "animation iris.html";
        });
    </script>
  </body>
</html>
